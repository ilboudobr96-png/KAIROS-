<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="author" content="Bernard Ilboudo"/>
  <meta name="theme-color" content="#060c17"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>KAIROS — Resilience Hub v11</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>"/>
<style>
:root {
  --bg:#060c17; --surf:#0c1422; --card:#101c2c; --dim:#131d2c; --border:#1a2e45;
  --teal:#00dfc4; --gold:#f5a623; --green:#22c55e; --orange:#f97316;
  --red:#ef4444; --yellow:#eab308; --blue:#3b82f6; --purple:#8b5cf6;
  --lia:#a78bfa; --text:#e8f0fc; --muted:#4e6a8a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);overflow-x:hidden}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input,textarea,select{font-family:inherit;color:var(--text)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
select option{background:var(--card)}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;z-index:9999;transition:opacity .5s}
.splash-icon{font-size:60px;animation:popIn .6s cubic-bezier(.34,1.56,.64,1)}
.splash-title{color:var(--teal);font-size:28px;font-weight:900;letter-spacing:3px}
.splash-sub{color:var(--muted);font-size:10px;font-weight:700;letter-spacing:2px;margin-top:-8px}
.dots{display:flex;gap:8px;margin-top:4px}
.dot{width:10px;height:10px;border-radius:50%;background:var(--teal);animation:bounce 1.2s ease infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes popIn{from{transform:scale(.3) rotate(-15deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-12px)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(2)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* APP SHELL */
#app{display:none;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;
  background:var(--bg);border-left:1px solid var(--border);border-right:1px solid var(--border)}

/* HEADER */
.hdr{background:var(--surf);padding:12px 16px 10px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0;position:relative;z-index:50}
.hdr-logo{display:flex;align-items:center;gap:9px}
.hdr-icon{width:34px;height:34px;border-radius:11px;background:linear-gradient(135deg,var(--teal),#0891b2);
  display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.hdr-name{font-size:15px;font-weight:900;line-height:1.1}
.hdr-sub{display:flex;gap:5px;align-items:center}
.hdr-sub span:first-child{color:var(--teal);font-size:7px;font-weight:800;letter-spacing:2.5px}
.version{background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.4);border-radius:6px;
  padding:1px 5px;color:var(--gold);font-size:7px;font-weight:700}
.hdr-right{display:flex;gap:6px;align-items:center}
.lia-btn{display:flex;align-items:center;gap:4px;background:rgba(167,139,250,.12);
  border:1px solid rgba(167,139,250,.3);border-radius:20px;padding:4px 10px;cursor:pointer}
.lia-btn span{color:var(--lia);font-size:10px;font-weight:800}
.pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--green);
  box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;display:inline-block;flex-shrink:0}
.bell-btn{position:relative;cursor:pointer;padding:4px}
.bell-btn .badge{position:absolute;top:0;right:0;width:15px;height:15px;border-radius:50%;
  background:var(--red);color:#fff;font-size:8px;font-weight:900;display:flex;align-items:center;justify-content:center}
.usr-btn{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;font-weight:900;color:#fff;flex-shrink:0}

/* TAGLINE */
.tagline{background:linear-gradient(90deg,rgba(0,223,196,.08),rgba(167,139,250,.06),rgba(139,92,246,.06));
  border-bottom:1px solid var(--border);padding:5px 16px;text-align:center}
.tagline span{color:var(--teal);font-size:9px;font-weight:700;letter-spacing:.5px}

/* CITY STRIP */
.city-strip{background:var(--surf);border-bottom:1px solid var(--border);
  padding:4px 16px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.city-left{display:flex;gap:4px;align-items:center;flex-shrink:0}
.city-left span:last-child{color:var(--muted);font-size:9px;font-weight:600}
.ticker{display:flex;align-items:center;gap:5px;flex:1;overflow:hidden}
.ticker .live-chip{background:rgba(239,68,68,.2);color:var(--red);border:1px solid rgba(239,68,68,.3);
  font-size:8px;font-weight:700;padding:1px 6px;border-radius:20px;white-space:nowrap}
.ticker-text{color:var(--text);font-size:9px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1}

/* SCREEN */
#screen{flex:1;overflow-y:auto;padding:14px 14px 0}

/* TABBAR */
.tabbar{background:var(--surf);border-top:1px solid var(--border);padding:8px 0 10px;
  display:flex;justify-content:space-around;flex-shrink:0}
.tab{display:flex;flex-direction:column;align-items:center;gap:2px;padding:2px 4px;
  opacity:.32;transition:opacity .2s;position:relative;background:none;border:none;cursor:pointer}
.tab.active{opacity:1}
.tab .t-icon{font-size:17px}
.tab .t-label{font-size:8px;font-weight:800}
.tab .t-line{width:14px;height:3px;border-radius:2px;margin-top:1px}
.tab .t-dot{position:absolute;top:0;right:2px;width:6px;height:6px;border-radius:50%;animation:pulse 2s infinite}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:15px;margin-bottom:12px}
.card.glow-green{border-color:rgba(34,197,94,.4);box-shadow:0 0 24px rgba(34,197,94,.08)}
.card.glow-teal{border-color:rgba(0,223,196,.4);box-shadow:0 0 24px rgba(0,223,196,.08)}
.card.glow-gold{border-color:rgba(245,166,35,.4);box-shadow:0 0 24px rgba(245,166,35,.08)}
.card.glow-red{border-color:rgba(239,68,68,.4);box-shadow:0 0 24px rgba(239,68,68,.08)}
.card.glow-lia{border-color:rgba(167,139,250,.4);box-shadow:0 0 24px rgba(167,139,250,.08)}

.sec-title{color:var(--teal);font-size:11px;font-weight:800;letter-spacing:1.5px;margin-bottom:10px}
.chip{display:inline-block;font-size:9px;padding:2px 8px;border-radius:20px;font-weight:700;white-space:nowrap}

/* RISK GRID */
.risk-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.risk-tile{border-radius:10px;padding:7px 3px;text-align:center}
.risk-val{font-size:17px;font-weight:900;line-height:1.1}
.risk-pct{font-size:7px}
.risk-lbl{color:var(--muted);font-size:7px;margin-top:2px;line-height:1.1}
.risk-tr{font-size:9px;margin-top:1px}
.risk-src{color:var(--muted);font-size:6px;margin-top:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

/* RADAR CANVAS */
#radar-canvas{width:100%;height:140px;display:block}

/* ALERTS */
.alert-card{background:var(--card);border-radius:14px;margin-bottom:8px;overflow:hidden;border-left:4px solid}
.alert-head{padding:11px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.alert-body{padding:0 14px 14px;border-top:1px solid var(--border);display:none}
.alert-body.open{display:block}
.alert-step{display:flex;gap:9px;margin-top:12px;align-items:flex-start}
.alert-step-n{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;font-weight:900}
.alert-note{margin-top:10px;background:var(--dim);border-radius:10px;padding:9px;border-left:3px solid var(--green)}
.alert-note p{color:var(--muted);font-size:10px;line-height:1.5;font-style:italic}

/* AUTO UPDATE BAR */
.update-bar{background:var(--dim);border-radius:12px;padding:9px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.update-bar-btns{display:flex;gap:5px}
.update-bar-btns button{border:1px solid;border-radius:8px;padding:4px 9px;font-size:10px;font-weight:700}

/* SOS */
.sos-btn{width:100%;background:linear-gradient(135deg,#b91c1c,var(--red));border:none;border-radius:14px;
  padding:14px;color:#fff;font-weight:900;font-size:14px;box-shadow:0 4px 20px rgba(239,68,68,.3);
  margin-bottom:14px}

/* BIG BUTTON */
.big-btn{width:100%;border:none;border-radius:14px;padding:14px;color:#fff;font-weight:900;
  font-size:14px;transition:all .2s;display:block;text-align:center}
.big-btn:disabled{background:var(--dim)!important;color:var(--muted);box-shadow:none}

/* PROGRESS BAR */
.prog-bar{height:4px;background:var(--dim);border-radius:3px;overflow:hidden}
.prog-bar-inner{height:100%;border-radius:3px;transition:width 1.4s ease}
.prog-bar-h8{height:8px;background:var(--dim);border-radius:4px;overflow:hidden}

/* CHECKLIST */
.check-item{background:var(--card);border:2px solid var(--border);border-radius:14px;
  padding:13px 16px;cursor:pointer;display:flex;align-items:center;gap:13px;transition:all .2s;margin-bottom:8px}
.check-item.done{background:rgba(34,197,94,.07);border-color:rgba(34,197,94,.3)}
.check-circle{width:24px;height:24px;border-radius:50%;flex-shrink:0;border:2px solid var(--muted);
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.check-item.done .check-circle{background:var(--green);border-color:var(--green)}
.check-label{font-size:13px;font-weight:600;flex:1;transition:all .2s}
.check-item.done .check-label{color:var(--muted);text-decoration:line-through}

/* NEXUS */
.nexus-node{display:flex;gap:11px;align-items:center;margin-bottom:9px;background:var(--dim);border-radius:12px;padding:10px 12px}
.nexus-node-info{flex:1}
.nexus-node-info .name{font-size:12px;font-weight:700}
.nexus-node-info .detail{color:var(--muted);font-size:10px}

/* GHOST */
.ghost-wrap{background:linear-gradient(135deg,#071a10,#0a1f14);border:1px solid #1a4030;border-radius:18px;padding:15px;margin-bottom:12px}
.ghost-stat{background:#0a2016;border-radius:10px;padding:8px 4px;text-align:center}
.ghost-stat .val{color:#00ff88;font-size:11px;font-weight:800}
.mesh-node{border-radius:10px;padding:9px 12px;margin-bottom:6px;display:flex;align-items:center;gap:9px}
.signal-bars{display:flex;gap:2px;align-items:flex-end}
.signal-bar{width:3px;border-radius:1px}

/* LIA */
.lia-hdr{background:linear-gradient(135deg,rgba(167,139,250,.1),rgba(124,58,237,.06));
  border:1px solid rgba(167,139,250,.25);border-radius:18px;padding:14px;margin-bottom:12px;flex-shrink:0}
.lia-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--lia),var(--purple));
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
  box-shadow:0 0 16px rgba(167,139,250,.4)}
.lia-msgs{flex:1;overflow-y:auto;padding-bottom:8px;min-height:0}
.msg-row{display:flex;margin-bottom:10px;align-items:flex-end;gap:7px}
.msg-row.user{justify-content:flex-end}
.msg-bubble{max-width:80%;padding:11px 13px;font-size:12px;line-height:1.7;white-space:pre-wrap}
.msg-bubble.user{background:rgba(0,223,196,.2);border:1px solid rgba(0,223,196,.3);border-radius:18px 18px 4px 18px}
.msg-bubble.lia{background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);border-radius:18px 18px 18px 4px}
.msg-lia-avatar{width:25px;height:25px;border-radius:50%;background:linear-gradient(135deg,var(--lia),var(--purple));
  display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.anchor-badge{margin-top:7px;padding:4px 8px;background:rgba(167,139,250,.1);border-radius:7px;border:1px solid rgba(167,139,250,.2)}
.anchor-badge span{color:var(--lia);font-size:8px;font-weight:700}
.typing{display:flex;gap:4px;align-items:center;padding:12px 16px;background:rgba(167,139,250,.1);
  border:1px solid rgba(167,139,250,.2);border-radius:18px 18px 18px 4px}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--lia);animation:bounce 1.2s ease infinite}
.typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
.lia-input-wrap{flex-shrink:0;padding-bottom:6px}
.lia-input-bar{display:flex;gap:8px;align-items:flex-end;background:var(--surf);border:1px solid rgba(167,139,250,.35);border-radius:18px;padding:10px 12px}
.lia-textarea{flex:1;background:none;border:none;color:var(--text);font-size:13px;resize:none;outline:none;line-height:1.5;max-height:80px;overflow-y:auto}
.lia-send{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--lia),var(--purple));
  border:none;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;transition:all .2s;flex-shrink:0}
.lia-send:disabled{background:var(--dim)!important}
.lia-credit{color:var(--muted);font-size:7px;text-align:center;margin-top:4px}
.suggestion-btn{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:11px 14px;
  cursor:pointer;text-align:left;color:var(--text);font-size:12px;display:flex;align-items:center;gap:8px;width:100%;margin-bottom:7px}
.suggestion-btn .arr{color:var(--lia);font-size:14px;margin-left:auto;flex-shrink:0}

/* PRESENTATION */
.slide-card{border:2px solid;border-radius:20px;padding:22px;min-height:280px;
  display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;position:relative;overflow:hidden;margin-bottom:10px}
.slide-prog{position:absolute;top:0;left:0;height:3px;border-radius:20px 20px 0 0;transition:width .06s}
.slide-emoji{font-size:48px;margin-bottom:11px}
.slide-num{font-size:9px;font-weight:800;letter-spacing:2px;margin-bottom:5px}
.slide-title{font-size:20px;font-weight:900;line-height:1.2;margin-bottom:12px}
.slide-body{font-size:12px;line-height:1.7;max-width:300px}
.slide-stat{border-radius:12px;padding:9px 14px;width:100%;max-width:300px;margin-top:14px;border:1px solid;font-size:10px;font-weight:700}
.slide-dots{display:flex;justify-content:center;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.slide-dot{height:6px;border-radius:3px;cursor:pointer;transition:all .3s}
.slide-controls{display:grid;grid-template-columns:1fr auto 1fr;gap:7px;align-items:center;margin-bottom:14px}
.slide-btn{border-radius:12px;padding:9px 0;font-weight:700;font-size:12px;width:100%;border:1px solid var(--border);color:var(--text);background:var(--dim)}
.slide-btn.next{border:none;color:#fff}
.slide-btn:disabled{opacity:.35;cursor:default}
.slide-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.slide-thumb{border-radius:11px;padding:9px 10px;cursor:pointer;display:flex;gap:6px;align-items:center;border:1px solid}
.slide-thumb .s-num{font-size:7px;font-weight:800}
.slide-thumb .s-name{font-size:10px;font-weight:700;color:var(--text);line-height:1.3}

/* ACCOUNT */
.account-form{display:flex;flex-direction:column;gap:0}
.form-field{margin-bottom:12px}
.form-label{color:var(--muted);font-size:10px;font-weight:700;letter-spacing:1px;margin-bottom:5px;display:block}
.form-input{width:100%;background:var(--dim);border:1px solid var(--border);border-radius:12px;
  color:var(--text);font-size:13px;padding:12px 14px;outline:none}
.form-input:focus{border-color:var(--teal)}
.form-input.error{border-color:var(--red)}
.form-err{color:var(--red);font-size:10px;margin-top:4px}
.form-select{width:100%;background:var(--dim);border:1px solid var(--border);border-radius:12px;
  color:var(--text);font-size:13px;padding:12px 14px;outline:none;appearance:none}
.checkbox-row{display:flex;gap:10px;align-items:flex-start;cursor:pointer;margin-bottom:16px}
.checkbox-box{width:20px;height:20px;border-radius:6px;border:2px solid var(--muted);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px}
.checkbox-box.checked{background:var(--teal);border-color:var(--teal)}
.profile-avatar{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.profile-stat{background:var(--dim);border-radius:10px;padding:10px 6px;text-align:center}
.profile-stat .ps-val{font-size:16px;font-weight:900}
.profile-stat .ps-lbl{color:var(--muted);font-size:8px;margin-top:2px}
.plan-card{border-radius:18px;padding:16px;margin-bottom:10px;border:2px solid var(--border)}
.verify-input{width:100%;background:var(--dim);border:1px solid var(--border);border-radius:12px;
  color:var(--text);font-size:28px;font-weight:900;padding:14px 0;outline:none;text-align:center;letter-spacing:12px}
.back-btn{background:var(--dim);border:1px solid var(--border);border-radius:10px;padding:5px 10px;
  color:var(--muted);font-size:11px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;margin-bottom:14px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:flex;align-items:center;justify-content:center;border-radius:0;padding:20px}
.modal-box{background:var(--surf);border-radius:22px;padding:28px;width:100%;max-width:320px;text-align:center}
.bottom-sheet{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:flex-end}
.bottom-sheet-content{background:var(--surf);border-radius:24px 24px 0 0;width:100%;padding:20px;max-height:80vh;overflow-y:auto}

/* ONBOARDING */
#onboarding{display:none;min-height:100vh;background:var(--bg);flex-direction:column}
.ob-header{background:linear-gradient(135deg,rgba(0,223,196,.1),rgba(167,139,250,.06));padding:28px 24px 20px;text-align:center;flex-shrink:0}
.ob-dots{display:flex;justify-content:center;gap:8px;margin-top:16px}
.ob-dot{height:8px;border-radius:4px;transition:all .3s;background:var(--border)}
.ob-dot.active{width:24px;background:var(--teal)}
.ob-dot:not(.active){width:8px}
.ob-body{flex:1;overflow-y:auto;padding:20px 20px 0}
.ob-foot{padding:16px 20px 24px;background:var(--surf);border-top:1px solid var(--border);flex-shrink:0}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.lang-btn{border-radius:14px;padding:12px 10px;cursor:pointer;display:flex;align-items:center;gap:8px;
  transition:all .2s;background:var(--dim);border:2px solid var(--border)}
.lang-btn.active{background:rgba(0,223,196,.12);border-color:var(--teal)}
.lang-flag{font-size:24px}
.lang-name{font-size:12px;font-weight:700}
.lang-tag{font-size:8px;color:var(--muted)}
.city-input{width:100%;background:var(--dim);border:1px solid var(--border);border-radius:14px;
  color:var(--text);font-size:15px;padding:14px 16px;outline:none;margin-bottom:12px;transition:border .2s}
.city-input:focus{border-color:var(--teal)}
.quick-cities{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.city-quick{border-radius:20px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;
  background:var(--dim);border:1px solid var(--border);color:var(--muted)}
.city-quick.sel{background:rgba(0,223,196,.12);border-color:var(--teal);color:var(--teal)}
.sector-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sector-btn{border-radius:16px;padding:16px 10px;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:6px;transition:all .2s;background:var(--dim);border:2px solid var(--border)}
.sector-btn.active{background:rgba(0,223,196,.12);border-color:var(--teal)}
.sector-emoji{font-size:26px}
.sector-name{font-size:12px;font-weight:700}
.sector-check{width:18px;height:18px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center}

/* MISC */
.info-box{display:flex;gap:0;border-radius:12px;overflow:hidden;margin-bottom:8px}
.info-box-label{padding:10px 12px;font-size:10px;font-weight:700;min-width:120px;flex-shrink:0}
.info-box-val{padding:10px 12px;font-size:11px;background:rgba(248,251,255,.05);flex:1;line-height:1.5}
.stars{color:var(--gold);font-size:10px}

/* Onboarding */
#onboarding{display:none}

/* DATA TRANSPARENCY */
.data-src-bar{background:rgba(0,223,196,.06);border:1px solid rgba(0,223,196,.2);border-radius:10px;padding:6px 12px;margin-top:8px;display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.src-badge{font-size:8px;font-weight:700;padding:2px 7px;border-radius:10px;background:rgba(0,223,196,.15);color:var(--teal);border:1px solid rgba(0,223,196,.3)}
.src-badge.estimated{background:rgba(245,166,35,.15);color:var(--gold);border-color:rgba(245,166,35,.3)}
.live-indicator{display:inline-flex;align-items:center;gap:3px;font-size:8px;font-weight:700}

/* VALIDATION */
.val-option{border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .2s;border:2px solid var(--border);background:var(--dim)}
.val-option.selected{background:rgba(0,223,196,.1);border-color:var(--teal)}
.nps-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.nps-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--dim);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center}
.nps-btn.sel{background:var(--teal);border-color:var(--teal);color:#060c17}
.tag-btn{border-radius:20px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--dim);color:var(--muted);margin:0 4px 6px 0;transition:all .2s;display:inline-block}
.tag-btn.sel{background:rgba(0,223,196,.15);border-color:var(--teal);color:var(--teal)}
.submitted-box{background:rgba(34,197,94,.1);border:2px solid var(--green);border-radius:16px;padding:22px;text-align:center;margin-top:12px}

const AUTO_PROMPT = `You are KAIROS Sentinel AI. Use web search to get CURRENT data from Copernicus, ECB, WHO, ACLED, Reuters.
Return ONLY valid JSON (no markdown, no backticks):
{"overallStatus":"STABILE","overallStatusEn":"STABLE","risks":[{"sectorEn":"Environment","value":15,"trend":"stable","source":"Copernicus"},{"sectorEn":"Economy","value":48,"trend":"up","source":"ECB"},{"sectorEn":"Health","value":12,"trend":"stable","source":"WHO"},{"sectorEn":"Society","value":22,"trend":"stable","source":"ACLED"}],"topAlert":{"title":"Titolo IT","titleEn":"Title EN","urgency":"MEDIA","urgencyEn":"MED","action":"Azione IT","actionEn":"Action EN","confidence":82,"source":"Reuters"},"ticker":["Notizia IT","News EN","خبر"]}
Use ACTUAL current data from your searches. Not fictional numbers.`;

async function callClaude(system, userMsg, webSearch=false) {
  const body = {
    model:'claude-sonnet-4-20250514',
    max_tokens: webSearch ? 1200 : 1000,
    system,
    messages:[{role:'user',content:userMsg}]
  };
  if(webSearch) body.tools = [{type:'web_search_20250305',name:'web_search'}];

  // Su Vercel → /api/claude (API key sicura lato server)
  // In locale (file://) → fallback diretto (solo per test)
  const onVercel = window.location.protocol !== 'file:';
  const endpoint = onVercel ? '/api/claude' : 'https://api.anthropic.com/v1/messages';

  const res = await fetch(endpoint, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  if(!res.ok) {
    const errData = await res.json().catch(()=>({}));
    throw new Error(errData.error?.message || 'API '+res.status);
  }
  const data = await res.json();
  const texts = (data.content||[]).filter(b=>b.type==='text');
  return texts[texts.length-1]?.text || '';
}

async function doAutoUpdate() {
  if(STATE.updating) return;
  STATE.updating = true;
  el('update-pulse').style.display='';
  renderHomeUpdateBar();
  try {
    const city = STATE.prefs.city || 'Roma';
    const raw = await callClaude(
      'You are KAIROS Sentinel AI. Use web search. Return ONLY valid JSON, no markdown.',
      AUTO_PROMPT + ` Focus on risks relevant to ${city}.`,
      true
    );
    const clean = raw.replace(/```json|```/gi,'').trim();
    const m = clean.match(/\{[\s\S]*\}/);
    if(m) {
      STATE.liveData = JSON.parse(m[0]);
      STATE.lastUpdate = new Date();
      if(STATE.liveData.ticker) {
        STATE.ticker = STATE.liveData.ticker;
        startTicker();
      }
      STATE.countdown = 300;
      if(STATE.tab === 'home') renderHome();
    }
  } catch(e) { console.warn('Auto-update failed:', e.message); }
  STATE.updating = false;
  el('update-pulse').style.display='none';
  renderHomeUpdateBar();
}

function startAutoUpdate() {
  doAutoUpdate();
  setInterval(() => {
    if(STATE.autoOn && !STATE.updating) doAutoUpdate();
  }, 5*60*1000);
  setInterval(() => {
    if(STATE.autoOn && STATE.countdown > 0) {

}

// ─── RADAR CANVAS ─────────────────────────────────────────────────────────
function drawRadar(canvasId, values, labels, cols) {
  const canvas = el(canvasId);
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth; const H = canvas.offsetHeight;
  canvas.width = W; canvas.height = H;
  const cx = W/2; const cy = H/2; const R = Math.min(W,H)*0.38;
  const n = values.length;

  ctx.clearRect(0,0,W,H);

  // Grid
  [0.25,0.5,0.75,1].forEach(f => {
    ctx.beginPath();
    for(let i=0;i<n;i++) {
      const a = (i/n)*Math.PI*2 - Math.PI/2;
      const x = cx + Math.cos(a)*R*f; const y = cy + Math.sin(a)*R*f;
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle='rgba(26,48,80,.6)'; ctx.lineWidth=1; ctx.stroke();
  });

  // Axes
  for(let i=0;i<n;i++) {
    const a = (i/n)*Math.PI*2 - Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(a)*R, cy+Math.sin(a)*R);
    ctx.strokeStyle='rgba(26,48,80,.4)'; ctx.lineWidth=1; ctx.stroke();
  }

  // Determine overall color
  const maxVal = Math.max(...values);
  const fillCol = maxVal>70?'#ef4444':maxVal>45?'#f97316':maxVal>25?'#eab308':'#00dfc4';

  // Data polygon
  ctx.beginPath();
  for(let i=0;i<n;i++) {
    const a = (i/n)*Math.PI*2 - Math.PI/2;
    const r = (values[i]/100)*R;
    const x = cx+Math.cos(a)*r; const y = cy+Math.sin(a)*r;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fillStyle = fillCol+'28'; ctx.fill();
  ctx.strokeStyle = fillCol; ctx.lineWidth=2; ctx.stroke();

  // Dots + labels
  for(let i=0;i<n;i++) {
    const a = (i/n)*Math.PI*2 - Math.PI/2;
    const r = (values[i]/100)*R;
    const x = cx+Math.cos(a)*r; const y = cy+Math.sin(a)*r;
    ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fillStyle=fillCol; ctx.fill();

    const lx = cx+Math.cos(a)*(R+14);
    const ly = cy+Math.sin(a)*(R+14);
    ctx.fillStyle='rgba(78,106,138,1)'; ctx.font='8px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(labels[i], lx, ly);
  }
}

function escHTML(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

function scrollLia() {
  const b = el('lia-bottom');
  if(b) b.scrollIntoView({behavior:'smooth'});
}

function liaKeydown(e) {
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();liaSend();}
}

function liaInputResize(el) {
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,80)+'px';
}

async function liaAsk(text) {
  const input = el('lia-input');
  if(input) input.value = text;
  await liaSend(text);
}

async function liaSend(overrideText) {
  const input = el('lia-input');
  const msg = overrideText || (input?input.value.trim():'');
  if(!msg || STATE.liaLoading) return;
  if(input) input.value = '';
  STATE.liaMessages.push({role:'user',content:msg});
  STATE.liaLoading = true;
  renderLia();

  const langNames = {it:'Italian',en:'English',es:'Spanish',fr:'French',de:'German',ar:'Arabic',
    zh:'Chinese',hi:'Hindi',ja:'Japanese',ru:'Russian',pt:'Portuguese',sw:'Swahili',bn:'Bengali',id:'Indonesian'};
  const langName = langNames[STATE.lang] || 'Italian';

  const SYS = `You are Lia, the AI intelligence of KAIROS — the world's first Resilience Operating System.
Role: Expert in crisis prevention, global risks, emergency preparedness, geopolitics, climate, economy, health.
Personality: Calm, clear, NEVER alarmist. Transform fear into preparation.
Format every response:
📡 WHAT'S REAL — verified facts
🔍 WHY IT MATTERS — context  
✅ WHAT YOU CAN DO — one concrete action
🎯 Confidence: [High/Medium/Low]
LANGUAGE: Always respond in ${langName}.`;

  try {
    const reply = await callClaude(SYS,
      STATE.liaMessages.map(m=>m.role+': '+m.content).join('\n\n'),
      true // web search enabled
    );
    STATE.liaMessages.push({role:'assistant',content:reply||T().liaError});
  } catch(e) {
    STATE.liaMessages.push({role:'assistant',content:T().liaError+'\n\n'+e.message});
  }
  STATE.liaLoading = false;
  renderLia();
}

          <button style="background:none;border:none;color:var(--muted);font-size:10px;cursor:pointer;text-decoration:underline" onclick="stopPresenting()">
            ${t.stopPres}
          </button>
        </div>
        <button class="slide-btn next" ${STATE.slideIdx===total-1?'disabled':''} onclick="goSlide(${STATE.slideIdx+1})" 
          style="${STATE.slideIdx===total-1?'background:var(--dim);color:var(--muted)':'background:linear-gradient(135deg,'+s.col+','+s.col+'aa);border:none;color:#fff'}">
          ${t.nextSlide}
        </button>
      </div>
      <div style="height:14px"></div>
    </div>`;
}

function goSlide(i) {
  const t = T();
  if(i<0||i>=t.slides.length) return;
  STATE.slideIdx = i;
  STATE.slideProgress = 0;
  renderSlide();
}

function toggleAutoSlide() {
  STATE.autoSlide = !STATE.autoSlide;
  STATE.slideProgress = 0;
  clearInterval(STATE.slideTimer);
  if(STATE.autoSlide) {
    let p = 0;
    STATE.slideTimer = setInterval(()=>{
      p++;

      const pg = el('slide-prog');

      if(p>=100) {
        p=0; STATE.slideProgress=0;
        const t=T();
        STATE.slideIdx = (STATE.slideIdx+1)%t.slides.length;
        renderSlide();
      }
    }, 60);
  }
  renderSlide();
}

function valToggleTag(key, idx) {
  const arr = STATE.val[key];
  if(arr.includes(idx)) STATE.val[key] = arr.filter(x=>x!==idx);
  else STATE.val[key] = [...arr, idx];
  renderValidation();
}

function submitValidation() {
  const v = STATE.val;
  const t = T();
  // Save locally
  KS.set('val_submitted', true);
  KS.set('val_data', v);
  STATE.val.submitted = true;

  // Try to send via Lia API as a background analytics message
  const summary = `KAIROS v11 Feedback:
Q1 userebbe: ${v.q1||'non risposto'}
Q2 pagherebbe Elite: ${v.q2||'non risposto'}
NPS: ${v.nps!=null?v.nps:'non risposto'}
Features preferite: ${(v.features||[]).join(', ')||'nessuna'}
Cosa manca: ${(v.missing||[]).join(', ')||'nessuna'}
Ruolo: ${v.role!=null?(t.valRoles[v.role]||v.role):'non risposto'}
Email: ${v.email||'non fornita'}
Commento: ${v.comment||'nessuno'}`;

  console.log('%c📊 KAIROS Feedback ricevuto:\n'+summary, 'color:#00dfc4');
  renderValidation();
}

// Account actions
function doLogin() {
  const t = T();
  STATE.accErrs = {};
  if(!/\S+@\S+\.\S+/.test(STATE.accForm.email)) STATE.accErrs.email = t.errorEmail;
  if(STATE.accForm.password.length < 8) STATE.accErrs.password = t.errorPwd;
  if(Object.keys(STATE.accErrs).length) { renderAccount(); return; }
  const u = {id:'u_'+Date.now(),email:STATE.accForm.email,firstName:'Utente',lastName:'',
    plan:'free',verified:true,joinedAt:new Date().toISOString(),city:STATE.prefs.city||'Roma',country:'Italia',phone:'',role:'Cittadino'};
  STATE.user = u; KS.set('user',u); STATE.accMode = null; renderAccount(); updateUserHeader();
}

function doRegister() {
  const t = T();
  STATE.accErrs = {};
  if(!/\S+@\S+\.\S+/.test(STATE.accForm.email)) STATE.accErrs.email = t.errorEmail;
  if(STATE.accForm.password.length < 8) STATE.accErrs.password = t.errorPwd;
  if(STATE.accForm.password !== STATE.accForm.confirmPwd) STATE.accErrs.confirmPwd = t.errorMatch;
  if(!STATE.accForm.terms) STATE.accErrs.terms = t.errorTerms;
  if(Object.keys(STATE.accErrs).length) { renderAccount(); return; }
  STATE.accMode = 'verify'; STATE.verCode = ''; renderAccount();
}

function doVerify() {
  const t = T();
  if(STATE.verCode.length !== 6) { STATE.accErrs={code:t.errorCode}; renderAccount(); return; }
  const u = {id:'u_'+Date.now(),email:STATE.accForm.email,
    firstName:STATE.accForm.firstName||'Utente',lastName:STATE.accForm.lastName||'',
    plan:'free',verified:true,joinedAt:new Date().toISOString(),
    city:STATE.accForm.city||STATE.prefs.city||'Roma',country:STATE.accForm.country||'Italia',
    phone:STATE.accForm.phone||'',role:STATE.accForm.role||'Cittadino'};
  STATE.user = u; KS.set('user',u); STATE.accMode = null; STATE.accErrs = {};
  renderAccount(); updateUserHeader();
}

function loginDemo() {
  const u = {id:'demo_1',email:'demo@kairos-app.com',firstName:'Marco',lastName:'Demo',
    plan:'elite',verified:true,joinedAt:'2024-01-15T00:00:00Z',
    city:'Roma',country:'Italia',phone:'+39 333 123456',role:'Cittadino'};
  STATE.user = u; KS.set('user',u); STATE.accMode = null; renderAccount(); updateUserHeader();
}

function saveEdit() {
  KS.set('user', STATE.user); STATE.accMode = null; renderAccount(); updateUserHeader();
}

function doLogout() {
  STATE.user = null; KS.del('user'); STATE.accMode = null; renderAccount(); updateUserHeader();
}

function upgradePlan(planId) {
  if(STATE.user) { STATE.user.plan = planId; KS.set('user',STATE.user); }
  STATE.accMode = null; renderAccount();
}

// ─── SOS ──────────────────────────────────────────────────────────────────
function showSOS() {
  const modal = el('sos-modal');
  modal.style.display = 'flex';
  STATE.sosCount = 3;
  renderSOSContent();
  STATE.sosTimer = setInterval(() => {
    STATE.sosCount--;
    if(STATE.sosCount <= 0) {
      clearInterval(STATE.sosTimer);
      el('sos-content').innerHTML = `
        <div style="font-size:40px;margin-bottom:8px">✅</div>
        <div style="color:var(--green);font-size:16px;font-weight:900;margin-bottom:8px">${T().sosSent}</div>
        <div style="color:var(--muted);font-size:12px;margin-bottom:14px">3 contatti notificati · Nexus attivato</div>
        <button onclick="closeSOS()" style="width:100%;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.35);border-radius:12px;padding:12px;color:var(--green);font-weight:700;font-size:13px;cursor:pointer">✓ Chiudi</button>`;
      setTimeout(closeSOS, 2500);
    } else {
      renderSOSContent();
    }
  }, 1000);
}

function renderSOSContent() {
  el('sos-content').innerHTML = `
    <div style="color:var(--red);font-size:15px;font-weight:900;margin-bottom:6px">${T().sosSending}</div>
    <div style="background:rgba(239,68,68,.12);border-radius:14px;padding:16px 0;margin-bottom:16px">
      <div style="color:var(--red);font-size:52px;font-weight:900">${STATE.sosCount}</div>
    </div>
    <button onclick="closeSOS()" style="width:100%;background:var(--dim);border:1px solid var(--border);border-radius:12px;padding:12px;color:var(--muted);font-weight:700;font-size:13px;cursor:pointer">✕ Annulla</button>`;
}

function closeSOS() {
  clearInterval(STATE.sosTimer);
  el('sos-modal').style.display = 'none';
}

// ─── LANG SHEET ───────────────────────────────────────────────────────────
function showLangSheet() {
  const t = T();
  const sheet = el('lang-sheet');
  el('lang-sheet-content').innerHTML = `
    <div style="display:flex;justify-content:space-between;margin-bottom:14px">
      <div style="font-size:14px;font-weight:800">🌐 ${t.langTitle}</div>
      <button onclick="el('lang-sheet').style.display='none'" style="background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;padding:0;line-height:1">×</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-bottom:10px">
      ${LANGS.map(l=>`
      <button onclick="${!l.soon?`setLang('${l.code}')`:''}" 
        style="background:${STATE.lang===l.code?'rgba(0,223,196,.12)':'var(--dim)'};
        border:2px solid ${STATE.lang===l.code?'var(--teal)':'var(--border)'};
        border-radius:14px;padding:10px 12px;cursor:${l.soon?'default':'pointer'};
        display:flex;align-items:center;gap:8px;opacity:${l.soon?'.5':'1'}">
        <span style="font-size:22px">${l.flag}</span>
        <div style="text-align:left">
          <div style="color:${STATE.lang===l.code?'var(--teal)':'var(--text)'};font-size:11px;font-weight:700">${l.name}</div>
          ${l.dir==='rtl'?'<div style="color:var(--muted);font-size:8px">RTL</div>':''}
          ${l.soon?'<div style="color:var(--muted);font-size:8px">Coming soon</div>':''}
        </div>
        ${STATE.lang===l.code?'<span style="color:var(--teal);margin-left:auto;font-size:14px">✓</span>':''}
      </button>`).join('')}
    </div>`;
  sheet.style.display = 'flex';
}

function setLang(code) {
  STATE.lang = code;
  STATE.prefs.lang = code;
  KS.set('prefs', STATE.prefs);
  el('lang-sheet').style.display = 'none';
  const l = LANGS.find(x=>x.code===code);
  if(l) { el('hdr-flag').textContent = l.flag; el('hdr-lang').textContent = code.toUpperCase(); }
  document.documentElement.dir = l?.dir||'ltr';
  updateStaticTexts();
  switchTab(STATE.tab);
}

// ─── TABS ──────────────────────────────────────────────────────────────────
function switchTab(id) {
  STATE.tab = id;
  renderTabBar();
  switch(id) {
    case 'home':  renderHome(); break;
    case 'lia':   renderLia(); break;
    case 'plan':  renderPlan(); break;
    case 'pres':  renderPresentation(); break;
    case 'nexus': renderNexus(); break;
    case 'val':   renderValidation(); break;
    case 'acc':   renderAccount(); break;
    default:      renderHome();
  }
  el('screen').scrollTop = 0;
}

function renderTabBar() {
  const t = T();
  const tabbar = el('tabbar');
  tabbar.innerHTML = TABS.map(tb => {
    const active = STATE.tab === tb.id;
    const col = TAB_COLS[tb.id] || 'var(--teal)';
    const lbl = tb.label[STATE.lang] || tb.label.en;
    return `
    <button class="tab ${active?'active':''}" onclick="switchTab('${tb.id}')">
      <span class="t-icon">${tb.icon}</span>
      <span class="t-label" style="color:${active?col:'var(--muted)'}">${lbl}</span>
      ${active?`<div class="t-line" style="background:${col}"></div>`:''}
      ${tb.id==='lia'&&!active?`<div class="t-dot" style="background:var(--green);box-shadow:0 0 5px var(--green)"></div>`:''}
      ${tb.id==='acc'&&!active&&!STATE.user?`<div class="t-dot" style="background:var(--blue)"></div>`:''}
      ${tb.id==='acc'&&STATE.user?`<div class="t-dot" style="background:var(--green)"></div>`:''}
    </button>`;
  }).join('');
}

function updateStaticTexts() {
  const t = T();
  el('tagline-txt').textContent = t.tagline;
  el('city-txt').textContent = STATE.prefs.city || t.city;
}

function updateUserHeader() {
  const usrDiv = el('usr-hdr');
  if(!usrDiv) return;
  if(STATE.user) {
    const initial = STATE.user.firstName?STATE.user.firstName[0].toUpperCase():'👤';
    usrDiv.className = 'usr-btn';
    usrDiv.innerHTML = initial;
    usrDiv.onclick = () => switchTab('acc');
  } else {
    usrDiv.className = '';
    usrDiv.innerHTML = `<button style="background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.35);border-radius:10px;padding:5px 9px;color:var(--blue);font-size:10px;font-weight:700;cursor:pointer" onclick="switchTab('acc')">👤</button>`;
    usrDiv.onclick = null;
  }
}

// ─── ONBOARDING ───────────────────────────────────────────────────────────
function renderOnboarding() {
  const ob = el('onboarding');
  ob.style.display = 'flex';
  const step = STATE.obStep;
  const lbl = {1:'obStep1',2:'obStep2',3:'obStep3'};

  // Update dots
  [1,2,3].forEach(i => {
    el('ob-d'+i).className = 'ob-dot' + (i===step?' active':'');
  });

  // Get text based on current ob lang
  const t = TX[STATE.obLang] || TX.it;
  el('ob-title').textContent = t.obWelcome;
  el('ob-sub').textContent = t.obSub;

  const body = el('ob-body');

  if(step===1) {
    body.innerHTML = `
      <div style="font-size:16px;font-weight:800;margin-bottom:14px">${t.obStep1}</div>
      <div class="lang-grid">
        ${LANGS.map(l=>`
        <button class="lang-btn ${STATE.obLang===l.code?'active':''}" onclick="obSetLang('${l.code}')" ${l.soon&&l.code!=='it'&&l.code!=='en'?'style="opacity:.5"':''}>
          <span class="lang-flag">${l.flag}</span>
          <div>
            <div class="lang-name" style="color:${STATE.obLang===l.code?'var(--teal)':'var(--text)'}">${l.name}</div>
            ${l.dir==='rtl'?'<div class="lang-tag">RTL</div>':''}
            ${l.soon&&l.code!=='it'&&l.code!=='en'?'<div class="lang-tag">Coming soon</div>':''}
          </div>
          ${STATE.obLang===l.code?'<span style="color:var(--teal);margin-left:auto;font-size:14px">✓</span>':''}
        </button>`).join('')}
      </div>`;
  } else if(step===2) {
    body.innerHTML = `
      <div style="font-size:16px;font-weight:800;margin-bottom:14px">${t.obStep2}</div>
      <input class="city-input" id="ob-city" placeholder="${t.obCityPh}" value="${STATE.obCity}" 
        oninput="STATE.obCity=this.value" onfocus="this.style.borderColor='var(--teal)'" onblur="this.style.borderColor='var(--border)'"/>
      <input class="city-input" placeholder="${STATE.lang==='ar'?'الدولة':'Country'}" value="${STATE.obCountry}" 
        oninput="STATE.obCountry=this.value" style="margin-top:0"/>
      <div style="color:var(--muted);font-size:10px;font-weight:700;letter-spacing:1px;margin-bottom:8px">
        ${STATE.obLang==='it'?'CITTÀ RAPIDE':STATE.obLang==='ar'?'مدن سريعة':'QUICK CITIES'}
      </div>
      <div class="quick-cities">
        ${QUICK_CITIES.map(c=>`
        <button class="city-quick ${STATE.obCity===c?'sel':''}" onclick="obSelectCity('${c}')">${c}</button>`).join('')}
      </div>`;
  } else {
    body.innerHTML = `
      <div style="font-size:16px;font-weight:800;margin-bottom:4px">${t.obStep3}</div>
      <div style="color:var(--muted);font-size:11px;margin-bottom:16px;line-height:1.5">${t.obStep3sub}</div>
      <div class="sector-grid">
        ${RISK_SECTORS.map(s=>`
        <button class="sector-btn ${STATE.obSectors.includes(s.id)?'active':''}" onclick="obToggleSector('${s.id}')">
          <span class="sector-emoji">${s.icon}</span>
          <span class="sector-name" style="color:${STATE.obSectors.includes(s.id)?'var(--teal)':'var(--muted)'}">${s.label[STATE.obLang]||s.label.en}</span>
          ${STATE.obSectors.includes(s.id)?'<div class="sector-check"><span style="color:#fff;font-size:10px">✓</span></div>':''}
        </button>`).join('')}
      </div>
      <div style="margin-top:8px">
        <div style="font-size:13px;font-weight:800;margin-bottom:10px">
          ${STATE.obLang==='it'?'Chi sei?':STATE.obLang==='ar'?'من أنت؟':'Who are you?'}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:7px">
          ${(t.valRoles||ROLES).map((r,i)=>`
          <button onclick="STATE.obRole=${i};renderOnboarding()" 
            style="border-radius:20px;padding:7px 13px;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;
            background:${STATE.obRole===i?'rgba(0,223,196,.15)':'var(--dim)'};
            border:1px solid ${STATE.obRole===i?'var(--teal)':'var(--border)'};
            color:${STATE.obRole===i?'var(--teal)':'var(--muted)'}">
            ${r}
          </button>`).join('')}
        </div>
      </div>`;
  }

  // Buttons
  const btns = el('ob-btns');
  btns.innerHTML = `
    ${step>1?`<button onclick="obStep(${step-1})" style="flex:1;background:var(--dim);border:1px solid var(--border);border-radius:14px;padding:14px;color:var(--muted);font-weight:700;font-size:13px;cursor:pointer">${t.obBack}</button>`:''}
    <button onclick="${step<3?'obStep('+(step+1)+')':'obFinish()'}" style="flex:2;background:linear-gradient(135deg,var(--teal),#0891b2);border:none;border-radius:14px;padding:14px;color:#fff;font-weight:900;font-size:14px;cursor:pointer;box-shadow:0 4px 20px rgba(0,223,196,.3)">
      ${step===3?t.obFinish:t.obNext}
    </button>`;

  const skip = el('ob-skip');
  if(step===1) {
    skip.innerHTML = `<button onclick="obFinish()" style="background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;text-decoration:underline">${t.obSkip}</button>`;
  } else {
    skip.innerHTML = '';
  }
}

function obStep(n) { STATE.obStep=n; renderOnboarding(); }
function obSetLang(code) { STATE.obLang=code; renderOnboarding(); }
function obSelectCity(c) { STATE.obCity=c; renderOnboarding(); }
function obToggleSector(id) {
  STATE.obSectors = STATE.obSectors.includes(id) ? STATE.obSectors.filter(x=>x!==id) : [...STATE.obSectors,id];
  renderOnboarding();
}

function obFinish() {
  STATE.lang = STATE.obLang || 'it';
  STATE.prefs = {
    city: STATE.obCity||'Roma',
    country: STATE.obCountry||'Italia',
    sectors: STATE.obSectors,
    lang: STATE.obLang || 'it',
    role: STATE.obRole,
  };
  KS.set('prefs', STATE.prefs);
  KS.set('onboarded', true);
  KS.set('app_version', 'v11.0.0');
  STATE.onboarded = true;
  // Save role to validation state too
  if(STATE.obRole !== null) STATE.val.role = STATE.obRole;
  el('onboarding').style.display = 'none';
  startApp();
}

// ─── START APP ────────────────────────────────────────────────────────────
function startApp() {
  const app = el('app');
  app.style.display = 'flex';
  const l = LANGS.find(x=>x.code===STATE.lang)||LANGS[0];
  el('hdr-flag').textContent = l.flag;
  el('hdr-lang').textContent = STATE.lang.toUpperCase();
  document.documentElement.dir = l.dir||'ltr';
  updateStaticTexts();
  updateUserHeader();
  renderTabBar();
  switchTab('home');
  startAutoUpdate();
}

// ─── BOOT ─────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  // Version migration: if stored version is older than v11, reset prefs lang to 'it'
  const storedVer = KS.get('app_version', null);
  if(!storedVer || storedVer !== 'v11.0.0') {
    const prefs = KS.get('prefs', null);
    if(prefs) {
      prefs.lang = prefs.lang || 'it';
      // Only reset to 'it' if they never explicitly chose a language
      // (stored version is old = came from v10 which defaulted to 'en')
      if(!storedVer) prefs.lang = 'it';
      KS.set('prefs', prefs);
      STATE.lang = prefs.lang;
      STATE.prefs = prefs;
    }
    KS.set('app_version', 'v11.0.0');
  }

  setTimeout(function() {
    const splash = el('splash');
    splash.style.opacity = '0';
    setTimeout(function() { if(splash.parentNode) splash.parentNode.removeChild(splash); }, 600);

    if(!STATE.onboarded) {
      renderOnboarding();
    } else {
      startApp();
    }
  }, 1200);
});
</script>
</body>
</html>
